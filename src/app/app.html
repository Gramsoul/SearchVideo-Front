<main>
  @if(!data()){
  <input type="text" (input)="url.set($event.target.value)">
  <button (click)="search()">confirm</button>
  }

  @if(data(); as d){
  <div>
    <div>
      <h1>{{d.title}}</h1>
      <video controls height="480" width="854" [poster]="d.thumbnail">
        <source [src]="d.url" type="video/mp4">
      </video>
    </div>

    <div>
      <h3>{{d.uploader}}</h3>

      <div>
        <p>{{d.description}}</p>
      </div>
    </div>
  </div>
  }


</main>
